name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  GO_VERSION: stable
  LIBOPENMPT_VERSION: 0.8.7

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux:
    name: linux-${{ matrix.goarch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - goarch: amd64
            runner: ubuntu-latest
            cc: clang
            cxx: clang++
          - goarch: arm64
            runner: ubuntu-24.04-arm
            cc: clang
            cxx: clang++
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq clang llvm-dev pkg-config make libasound2-dev
          sudo apt-get install -y -qq libopenmpt-dev

      - name: Build binary
        run: |
          export CGO_ENABLED=1
          export GOOS=linux
          export GOARCH=${{ matrix.goarch }}
          export CC="${{ matrix.cc }}"
          export CXX="${{ matrix.cxx }}"
          make build

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: neoviolet-linux-${{ matrix.goarch }}
          path: neoviolet
          if-no-files-found: error

  macos:
    name: macos-${{ matrix.goarch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - goarch: amd64
            runner: macos-15-intel
            cc: clang
            cxx: clang++
          - goarch: arm64
            runner: macos-latest
            cc: clang
            cxx: clang++
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install dependencies
        run: |
          brew update
          brew install pkg-config make libopenmpt

      - name: Build binary
        run: |
          export CGO_ENABLED=1
          export GOOS=darwin
          export GOARCH=${{ matrix.goarch }}
          export CC="${{ matrix.cc }}"
          export CXX="${{ matrix.cxx }}"
          make build

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: neoviolet-macos-${{ matrix.goarch }}
          path: neoviolet
          if-no-files-found: error

  windows:
    name: windows-${{ matrix.goarch }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goarch: amd64
            msystem: MINGW64
            pkg_prefix: mingw-w64-x86_64
            compiler_pkg: mingw-w64-x86_64-clang
            libopenmpt_pkg: mingw-w64-x86_64-libopenmpt
            go_pkg: mingw-w64-x86_64-go
            cc: clang
            cxx: clang++
          - goarch: arm64
            msystem: CLANGARM64
            pkg_prefix: mingw-w64-clang-aarch64
            compiler_pkg: mingw-w64-clang-aarch64-clang
            libopenmpt_pkg: mingw-w64-clang-aarch64-libopenmpt
            go_pkg: mingw-w64-clang-aarch64-go
            cc: clang
            cxx: clang++
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: ${{ matrix.msystem }}
          update: true
          install: >-
            ${{ matrix.compiler_pkg }}
            ${{ matrix.pkg_prefix }}-pkg-config
            ${{ matrix.libopenmpt_pkg }}
            ${{ matrix.go_pkg }}
            make
            curl
            ca-certificates
          path-type: inherit

      - name: Build binary
        run: |
          export CGO_ENABLED=1
          export GOOS=windows
          export GOARCH=${{ matrix.goarch }}
          export CC="${{ matrix.cc }}"
          export CXX="${{ matrix.cxx }}"
          export CGO_LDFLAGS="-static-libgcc -static-libstdc++ -Wl,-Bstatic -lopenmpt -Wl,-Bdynamic"
          make build

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: neoviolet-windows-${{ matrix.goarch }}
          path: neoviolet.exe
          if-no-files-found: error