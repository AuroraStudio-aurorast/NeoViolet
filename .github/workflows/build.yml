name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  GO_VERSION: stable
  LIBOPENMPT_VERSION: 0.8.7

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux:
    name: linux-${{ matrix.goarch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - goarch: amd64
            runner: ubuntu-20.04
            cc: clang
            cxx: clang++
          - goarch: "386"
            runner: ubuntu-20.04
            cc: "clang -m32"
            cxx: "clang++ -m32"
            deps: gcc-multilib g++-multilib
          - goarch: arm64
            runner: ubuntu-20.04-arm
            cc: clang
            cxx: clang++
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq clang llvm-dev pkg-config make libasound2-dev ${{ matrix.deps }}
          sudo apt-get install -y -qq libopenmpt-dev

      - name: Build binary
        run: |
          export CGO_ENABLED=1
          export GOOS=linux
          export GOARCH=${{ matrix.goarch }}
          export CC="${{ matrix.cc }}"
          export CXX="${{ matrix.cxx }}"
          make build

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: neoviolet-linux-${{ matrix.goarch }}
          path: neoviolet
          if-no-files-found: error

  macos:
    name: macos-${{ matrix.goarch }}
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goarch: amd64
            cc: "clang -arch x86_64"
            cxx: "clang++ -arch x86_64"
          - goarch: arm64
            cc: clang
            cxx: clang++
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install dependencies
        run: |
          brew update
          brew install pkg-config make

      - name: Cache libopenmpt (amd64)
        if: matrix.goarch == 'amd64'
        id: cache-openmpt-macos
        uses: actions/cache@v5
        with:
          path: /tmp/libopenmpt-macos-x86_64
          key: libopenmpt-${{ env.LIBOPENMPT_VERSION }}-macos-x86_64

      - name: Build libopenmpt from source (amd64)
        if: matrix.goarch == 'amd64' && steps.cache-openmpt-macos.outputs.cache-hit != 'true'
        run: |
          PREFIX=/tmp/libopenmpt-macos-x86_64
          mkdir -p "$PREFIX"

          cd /tmp
          curl -fsSL \
            "https://lib.openmpt.org/files/libopenmpt/src/libopenmpt-${LIBOPENMPT_VERSION}+release.autotools.tar.gz" \
            -o libopenmpt.tar.gz
          tar xzf libopenmpt.tar.gz
          cd "libopenmpt-${LIBOPENMPT_VERSION}+release.autotools"

          export SDKROOT=$(xcrun --sdk macosx --show-sdk-path)
          ./configure \
            --host=x86_64-apple-darwin \
            --prefix="$PREFIX" \
            --enable-static --disable-shared \
            --disable-examples --disable-tests --disable-openmpt123 \
            CC="clang -arch x86_64" CXX="clang++ -arch x86_64"

          make -j$(sysctl -n hw.ncpu)
          make install

      - name: Install libopenmpt via Homebrew (arm64)
        if: matrix.goarch == 'arm64'
        run: brew install libopenmpt

      - name: Build binary
        run: |
          export CGO_ENABLED=1
          export GOOS=darwin
          export GOARCH=${{ matrix.goarch }}
          export CC="${{ matrix.cc }}"
          export CXX="${{ matrix.cxx }}"

          if [ "${{ matrix.goarch }}" = "amd64" ]; then
            export PKG_CONFIG_PATH=/tmp/libopenmpt-macos-x86_64/lib/pkgconfig
          fi

          make build

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: neoviolet-macos-${{ matrix.goarch }}
          path: neoviolet
          if-no-files-found: error

  windows:
    name: windows-${{ matrix.goarch }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goarch: amd64
            msystem: MINGW64
            pkg_prefix: mingw-w64-x86_64
            compiler_pkg: mingw-w64-x86_64-clang
            libopenmpt_pkg: mingw-w64-x86_64-libopenmpt
            cc: clang
            cxx: clang++
          - goarch: "386"
            msystem: MINGW32
            pkg_prefix: mingw-w64-i686
            compiler_pkg: mingw-w64-i686-gcc
            libopenmpt_pkg: mingw-w64-i686-libopenmpt
            cc: gcc
            cxx: g++
          - goarch: arm64
            msystem: CLANGARM64
            pkg_prefix: mingw-w64-clang-aarch64
            compiler_pkg: mingw-w64-clang-aarch64-clang
            libopenmpt_pkg: mingw-w64-clang-aarch64-libopenmpt
            cc: clang
            cxx: clang++
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: ${{ matrix.msystem }}
          update: true
          install: >-
            ${{ matrix.compiler_pkg }}
            ${{ matrix.pkg_prefix }}-pkg-config
            ${{ matrix.libopenmpt_pkg }}
            make
            curl
            ca-certificates

      - name: Add Go to PATH for MSYS2
        run: |
          if command -v go &> /dev/null; then
            GOROOT=$(go env GOROOT)
          else
            GOROOT=$(find /c/hostedtoolcache/windows/go -maxdepth 2 -type d -name "bin" 2>/dev/null | head -1 | sed 's|/bin||')
          fi
          if [ -z "$GOROOT" ]; then
            echo "Error: Could not locate GOROOT"
            exit 1
          fi
          echo "GOROOT=$GOROOT" >> $GITHUB_ENV
          echo "PATH=$GOROOT/bin:$PATH" >> $GITHUB_ENV

      - name: Build binary
        run: |
          export PATH="$GOROOT/bin:$PATH"
          export CGO_ENABLED=1
          export GOOS=windows
          export GOARCH=${{ matrix.goarch }}
          export CC="${{ matrix.cc }}"
          export CXX="${{ matrix.cxx }}"
          export CGO_LDFLAGS="-static-libgcc -static-libstdc++ -Wl,-Bstatic -lopenmpt -Wl,-Bdynamic"
          make build

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: neoviolet-windows-${{ matrix.goarch }}
          path: neoviolet.exe
          if-no-files-found: error